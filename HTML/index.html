<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Village Feed</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-body">

<!-- ================= AUTH CONTAINER ================= -->
<div class="auth-container">

    <!-- LEFT BRAND PANEL -->
    <div class="auth-left">
        <h1>🌍 Village Feed</h1>
        <p>Connect. Report. Improve your village.</p>
    </div>

    <!-- RIGHT LOGIN PANEL -->
    <div class="auth-right">

        <div class="auth-box">

            <h2>Welcome Back</h2>
            <p class="subtext">Login to continue</p>

            <!-- LOGIN FORM -->
            <form onsubmit="event.preventDefault(); login();">

                <input type="text"
                       id="username"
                       placeholder="Username"
                       autocomplete="username"
                       autofocus>

                <input type="password"
                       id="password"
                       placeholder="Password"
                       autocomplete="current-password">

                <button type="submit" class="auth-btn">Login</button>

            </form>

            <!-- MESSAGE -->
            <p id="message" class="msg"></p>

            <!-- LINKS -->
            <div class="auth-links">
                <p onclick="showRegister()">Create new account</p>
                <p onclick="forgotPassword()">Forgot password?</p>
            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
